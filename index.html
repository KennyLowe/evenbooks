<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"
    />
    <title>evenBooks</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #232323;
        color: #e5e5e5;
        font: 15px/1.5 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        touch-action: manipulation;
        -webkit-text-size-adjust: 100%;
        overscroll-behavior: none;
      }
      #phone-status {
        max-width: 28rem;
        margin: 0 auto;
        padding: 1.5rem 1.25rem;
        box-sizing: border-box;
      }
      #phone-status header h1 {
        margin: 0 0 0.25rem 0;
        font-size: 1.4rem;
        letter-spacing: 0.02em;
      }
      .connection {
        margin: 0 0 1.5rem 0;
        font-size: 0.95rem;
        color: #aaa;
      }
      .connection[data-state="connected"] {
        color: #6ec773;
      }
      .connection[data-state="not-connected"] {
        color: #e07a7a;
      }
      .reading {
        margin: 0 0 1.25rem 0;
      }
      .reading .title {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 600;
      }
      .reading .author {
        margin: 0.1rem 0 0.5rem 0;
        color: #aaa;
        font-size: 0.95rem;
      }
      .reading .progress {
        margin: 0;
        font-variant-numeric: tabular-nums;
      }
      .notice {
        margin-top: 1rem;
        padding: 0.75rem 0.9rem;
        border-left: 3px solid #c93;
        background: rgba(204, 153, 51, 0.12);
        font-size: 0.95rem;
      }
      .notice[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <main id="phone-status">
      <header>
        <h1>evenBooks</h1>
        <p class="connection" data-state="connecting">Connecting…</p>
      </header>

      <section class="reading">
        <p class="title"></p>
        <p class="author"></p>
        <p class="progress"></p>
      </section>

      <aside class="notice" hidden></aside>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
